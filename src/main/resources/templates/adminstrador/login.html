<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Falcons</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/loginStyle.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <a class="logo" href="http://localhost:8080/">
        <img src="/logo.png" alt="Falcons">
    </a>

    <nav class="nav" id="nav">
        <a href="/nosotros">Nosotros</a>
        <a href="/calificaciones/ranking">Rankings</a>
        <a href="/prematricula">Matricula</a>
        <a href="/login">Plataforma</a>
    </nav>

    <div class="acciones">
        <button class="btn-info" onclick="window.open('https://w.app/6iazvh','_blank')">Solicitar información</button>
    </div>

    <div class="hamburguesa" id="hamburguesa">☰</div>
</header>

<!-- ================= LOGIN ================= -->
<section class="login-section">

    <div class="login-box">

        <img src="/logo.png" class="login-logo" alt="Logo">

        <h2>Acceso al Sistema</h2>

        <!-- MENSAJES -->
        <p class="message error" th:if="${param.error}">
            Credenciales incorrectas ❌
        </p>

        <!-- ================= FORM CORRECTO ================= -->
        <form method="POST" action="/login">

            <!-- SOLO 3 ROLES -->
            <select name="rol" required>
                <option value="">Selecciona tu rol</option>
                <option value="ADMINISTRADOR">Administrador</option>
                <option value="TUTOR">Tutor</option>
                <option value="ESTUDIANTE">Estudiante</option>
            </select>

            <input type="text" name="username" placeholder="Usuario" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <button type="submit">Acceder</button>
        </form>

    </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Falcons Academy - Todos los derechos reservados</p>
</footer>

<!-- ================= SCRIPT MENU ================= -->
<script>
    document.getElementById("hamburguesa").onclick = function(){
        document.getElementById("nav").classList.toggle("active");
    }
</script>

</body>
</html>
