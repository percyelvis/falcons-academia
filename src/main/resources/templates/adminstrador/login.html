<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Falcons</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/loginStyle.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <a class="logo" href="/">
        <img src="/logo.png" alt="Falcons">
    </a>

    <nav class="nav" id="nav">
        <a href="/nosotros">Nosotros</a>
        <a href="/calificaciones/ranking">Rankings</a>
        <a href="/prematricula">Matricula</a>
        <a href="/login">Plataforma</a>
    </nav>

    <div class="acciones">
        <button class="btn-info" onclick="window.open('https://w.app/6iazvh','_blank')">Solicitar información</button>
    </div>

    <div class="hamburguesa" id="hamburguesa">☰</div>
</header>

<!-- ================= LOGIN ================= -->
<section class="login-section">

    <div class="login-box">

        <img src="/logo.png" class="login-logo" alt="Logo">

        <h2>Acceso al Sistema</h2>

        <!-- ================= FORM CORRECTO ================= -->
        <form method="POST" action="/login">

            <!-- SOLO 3 ROLES -->
            <select name="rol" required>
                <option value="">Selecciona tu rol</option>
                <option value="ADMINISTRADOR">Administrador</option>
                <option value="TUTOR">Tutor</option>
                <option value="ESTUDIANTE">Estudiante</option>
            </select>

            <input type="text" name="username" placeholder="Usuario" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <button type="submit">Acceder</button>
        </form>

    </div>
</section>
</section>

<!-- MODAL GLOBAL -->
<div id="modalError" class="modal-overlay" th:if="${error}">
    <div class="modal-content animate-pop">
        <div class="warning-icon-container">
            <div class="warning-icon">!</div>
        </div>

        <h3>Acceso Denegado</h3>
        <p th:text="${error}"></p>

        <div class="timer-text">Reintentando en unos segundos...</div>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<footer class="footer">
<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Falcons Academy - Todos los derechos reservados</p>
</footer>

<!-- ================= SCRIPT MENU ================= -->
<script>
    document.getElementById("hamburguesa").onclick = function(){
        document.getElementById("nav").classList.toggle("active");
    }

    function cerrarModal() {
        const modal = document.getElementById("modalError");
        // Añadimos una transición de salida rápida
        modal.style.opacity = "0";
        setTimeout(() => {
            modal.style.display = "none";
        }, 300);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const modal = document.getElementById("modalError");

        if (modal) {
            // Esperar 4 segundos (4000ms) antes de cerrar
            setTimeout(() => {
                // Animación de salida suave
                modal.style.transition = "opacity 0.5s ease, transform 0.5s ease";
                modal.style.opacity = "0";
                modal.style.transform = "translateY(-20px)";

                setTimeout(() => {
                    modal.style.display = "none";

                    // OPCIONAL: Limpia el parámetro 'error' de la URL sin recargar
                    const url = new URL(window.location);
                    url.searchParams.delete('error');
                    window.history.replaceState({}, document.title, url);

                }, 500);
            }, 4000);
        }
    });


</script>



</body>
</html>
